name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: bjaus/api
          files: ./coverage.txt
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build ./...

  bench:
    name: Bench
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Bench PR head
        run: |
          go test -run=^$ -bench=. -benchmem -count=6 ./... | tee new.txt

      - name: Bench base
        run: |
          git fetch origin ${{ github.base_ref }}
          git checkout origin/${{ github.base_ref }}
          go test -run=^$ -bench=. -benchmem -count=6 ./... | tee old.txt

      - name: Compare
        run: |
          benchstat old.txt new.txt | tee compare.txt
          # Fail if any benchmark row shows a regression > 10% in any metric
          # (sec/op, B/op, or allocs/op). A regression is a positive percentage
          # change (e.g. "+12.50%") in benchstat's "vs base" column.
          awk '
            {
              for (i = 1; i <= NF; i++) {
                if ($i ~ /^\+[0-9]+\.[0-9]+%$/) {
                  pct = $i
                  gsub(/[+%]/, "", pct)
                  if (pct + 0 > 10.0) {
                    print "REGRESSION (>10%): " $0
                    bad = 1
                  }
                }
              }
            }
            END { if (bad) exit 1 }
          ' compare.txt
